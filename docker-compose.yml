services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verbatim-api
    env_file:
      - path: .env
        required: false
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - INDEX_PATH=${INDEX_PATH:-/data/index.db}
    volumes:
      - milvus_data:/data
    restart: unless-stopped
    # /api/status initialises the RAG pipeline, so the first probe also
    # downloads the embedding model: hence the long start_period, during which
    # failures do not count, and a timeout wide enough for that first call.
    # A missing dependency or unusable configuration makes /api/status return
    # 500, which raises in the probe and surfaces as an unhealthy service.
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 15s
      timeout: 30s
      retries: 5
      start_period: 180s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: verbatim-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  milvus_data:
